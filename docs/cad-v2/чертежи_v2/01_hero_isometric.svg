<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1190 842" font-family="Inter, Arial, sans-serif">
  <!-- HERO · Изометрия мото-капсулы с инертной средой и частицами Ar -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#1a3447" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#0a0b0d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0b0d" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="capsuleFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="rgba(91,192,235,0.35)"/>
      <stop offset="100%" stop-color="rgba(91,192,235,0.05)"/>
    </linearGradient>
    <linearGradient id="capsuleTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="rgba(91,192,235,0.55)"/>
      <stop offset="100%" stop-color="rgba(91,192,235,0.20)"/>
    </linearGradient>
    <linearGradient id="capsuleSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="rgba(91,192,235,0.4)"/>
      <stop offset="100%" stop-color="rgba(91,192,235,0.10)"/>
    </linearGradient>
    <radialGradient id="orbCore" cx="35%" cy="30%" r="60%">
      <stop offset="0%"  stop-color="#82d3f3"/>
      <stop offset="40%" stop-color="#5BC0EB"/>
      <stop offset="100%" stop-color="#1e4a64" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#5BC0EB" stroke-width="0.4" opacity="0.06"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1190" height="842" fill="#0a0b0d"/>
  <rect width="1190" height="842" fill="url(#grid)"/>
  <rect width="1190" height="842" fill="url(#bgGlow)"/>

  <!-- Декоративные горизонтальные линии -->
  <line x1="80" y1="120" x2="320" y2="120" stroke="#5BC0EB" stroke-width="0.6" opacity="0.4"/>
  <line x1="80" y1="720" x2="320" y2="720" stroke="#5BC0EB" stroke-width="0.6" opacity="0.4"/>
  <line x1="870" y1="120" x2="1110" y2="120" stroke="#5BC0EB" stroke-width="0.6" opacity="0.4"/>
  <line x1="870" y1="720" x2="1110" y2="720" stroke="#5BC0EB" stroke-width="0.6" opacity="0.4"/>

  <!-- EYEBROW left -->
  <g transform="translate(80, 110)">
    <text font="500 11px Inter" fill="#5BC0EB" letter-spacing="3" font-size="11" font-weight="500">PROTOTYPE 01 · MOTO</text>
  </g>

  <!-- EYEBROW right -->
  <g transform="translate(1110, 110)">
    <text font-size="11" fill="#5BC0EB" letter-spacing="3" font-weight="500" text-anchor="end">PATENT PENDING · 2026</text>
  </g>

  <!-- ИЗОМЕТРИЯ КАПСУЛЫ (центр) -->
  <g transform="translate(595, 460)" filter="url(#glow)">
    <!-- Размеры в проекции (1 unit = 0.4 mm). Капсула 2500×1000×1500. -->
    <!-- Параллелограммы — 30° углы изометрии -->

    <!-- Дно (отбрасываемая тень) -->
    <ellipse cx="0" cy="180" rx="290" ry="40" fill="#5BC0EB" opacity="0.08" filter="url(#glow)"/>

    <!-- Передняя грань -->
    <polygon
      points="-275,150 275,150 275,-150 -275,-150"
      fill="url(#capsuleFront)" stroke="#5BC0EB" stroke-width="1" stroke-opacity="0.7"/>
    <!-- Верхняя грань -->
    <polygon
      points="-275,-150 275,-150 365,-225 -185,-225"
      fill="url(#capsuleTop)" stroke="#5BC0EB" stroke-width="1" stroke-opacity="0.6"/>
    <!-- Боковая грань -->
    <polygon
      points="275,-150 365,-225 365,75 275,150"
      fill="url(#capsuleSide)" stroke="#5BC0EB" stroke-width="1" stroke-opacity="0.6"/>

    <!-- Молния по верху -->
    <line x1="-185" y1="-225" x2="365" y2="-225" stroke="#E8A33D" stroke-width="2" stroke-dasharray="3,2"/>

    <!-- Внутри капсулы — мотоцикл, контурно -->
    <g stroke="#5BC0EB" stroke-width="1.4" fill="none" opacity="0.85">
      <circle cx="-160" cy="80" r="55"/>
      <circle cx="180" cy="80" r="55"/>
      <path d="M-160,80 L-50,-15 L100,-15 L180,80 M-50,-15 L-50,-50 M100,-15 L100,-50 M-30,-50 L80,-50"/>
      <path d="M-100,80 L20,5 L130,80"/>
    </g>

    <!-- Световой акцент-сфера в центре (Ar atmosphere) -->
    <circle cx="0" cy="0" r="60" fill="url(#orbCore)" opacity="0.6"/>

    <!-- Узлы: порт, окно, гермоввод -->
    <circle cx="-235" cy="135" r="8" fill="#E8A33D" stroke="#fff" stroke-width="1.5"/>
    <rect x="220" y="-20" width="22" height="22" fill="rgba(178,235,242,0.6)" stroke="#82d3f3" stroke-width="1.5"/>
    <circle cx="345" cy="-205" r="6" fill="#E8A33D"/>
  </g>

  <!-- Частицы газа -->
  <g opacity="0.7">
    <circle cx="450" cy="320" r="2" fill="#5BC0EB"/>
    <circle cx="520" cy="380" r="1.5" fill="#82d3f3"/>
    <circle cx="600" cy="290" r="2.5" fill="#5BC0EB"/>
    <circle cx="680" cy="350" r="1.8" fill="#82d3f3"/>
    <circle cx="760" cy="320" r="2" fill="#5BC0EB"/>
    <circle cx="500" cy="500" r="1.5" fill="#82d3f3"/>
    <circle cx="580" cy="540" r="2" fill="#5BC0EB"/>
    <circle cx="650" cy="510" r="1.8" fill="#82d3f3"/>
    <circle cx="730" cy="480" r="2.2" fill="#5BC0EB"/>
    <circle cx="430" cy="450" r="1.5" fill="#5BC0EB"/>
    <circle cx="800" cy="420" r="1.7" fill="#82d3f3"/>
    <circle cx="900" cy="350" r="1.4" fill="#5BC0EB"/>
    <circle cx="880" cy="500" r="1.8" fill="#82d3f3"/>
    <circle cx="380" cy="380" r="1.3" fill="#82d3f3"/>
  </g>

  <!-- Подписи узлов с лидерами -->
  <g font-family="JetBrains Mono, ui-monospace, Consolas, monospace" font-size="11" fill="#8a93a6">
    <!-- Молния -->
    <line x1="350" y1="200" x2="700" y2="160" stroke="#E8A33D" stroke-width="0.6"/>
    <text x="710" y="158" fill="#E8A33D" font-weight="500">YKK AQUASEAL №8 · L=3000 мм</text>
    <text x="710" y="175" fill="#8a93a6" font-size="9">МОЛНИЯ ВДОЛЬ ДЛИННОЙ ОСИ</text>
    <!-- Порт -->
    <line x1="345" y1="595" x2="320" y2="650" stroke="#E8A33D" stroke-width="0.6"/>
    <text x="320" y="668" fill="#E8A33D" font-weight="500" text-anchor="end">SCHRADER PORT · ⌀ 35 мм</text>
    <text x="320" y="683" fill="#8a93a6" font-size="9" text-anchor="end">ПОРТ ДОЗАПРАВКИ N₂</text>
    <!-- Окно -->
    <line x1="830" y1="450" x2="900" y2="500" stroke="#82d3f3" stroke-width="0.6"/>
    <text x="910" y="498" fill="#82d3f3" font-weight="500">ОПТИЧЕСКОЕ ОКНО · ⌀ 30 мм</text>
    <text x="910" y="513" fill="#8a93a6" font-size="9">PRESENS SP-PSt6 READOUT</text>
    <!-- Гермоввод -->
    <line x1="940" y1="240" x2="900" y2="200" stroke="#E8A33D" stroke-width="0.6"/>
    <text x="900" y="195" fill="#E8A33D" font-weight="500" text-anchor="end">ГЕРМОВВОД · M6×0,75</text>
    <text x="900" y="210" fill="#8a93a6" font-size="9" text-anchor="end">CABLE GLAND IP68</text>
  </g>

  <!-- Метрики снизу -->
  <g transform="translate(0, 760)" font-family="JetBrains Mono, ui-monospace, Consolas, monospace">
    <line x1="80" y1="0" x2="1110" y2="0" stroke="#2A2F3A" stroke-width="1"/>

    <text x="180" y="35" font-size="32" fill="#5BC0EB" font-weight="500" text-anchor="middle">3.75</text>
    <text x="180" y="55" font-size="9" fill="#8a93a6" letter-spacing="2" text-anchor="middle">M³ ВНУТРЕННИЙ ОБЪЁМ</text>

    <text x="430" y="35" font-size="32" fill="#5BC0EB" font-weight="500" text-anchor="middle">14.0</text>
    <text x="430" y="55" font-size="9" fill="#8a93a6" letter-spacing="2" text-anchor="middle">M² ОБОЛОЧКА</text>

    <text x="680" y="35" font-size="32" fill="#5BC0EB" font-weight="500" text-anchor="middle">≤ 0.5</text>
    <text x="680" y="55" font-size="9" fill="#8a93a6" letter-spacing="2" text-anchor="middle">% ОСТАТОЧНЫЙ O₂</text>

    <text x="930" y="35" font-size="32" fill="#5BC0EB" font-weight="500" text-anchor="middle">50</text>
    <text x="930" y="55" font-size="9" fill="#8a93a6" letter-spacing="2" text-anchor="middle">ЛЕТ ЗАЩИТА</text>
  </g>

  <!-- Тех. лейбл сверху по центру -->
  <text x="595" y="80" font-family="Inter" font-size="14" fill="#5BC0EB" letter-spacing="6" text-anchor="middle" font-weight="500">INERTUM</text>
  <text x="595" y="100" font-family="Inter" font-size="11" fill="#8a93a6" letter-spacing="3" text-anchor="middle">LONG-TERM PRESERVATION CAPSULE · MOTO</text>
</svg>
