<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1190 842" font-family="Inter, Arial, sans-serif">
  <!-- 5 LAYERS — визуализация 5 слоёв защиты -->
  <defs>
    <pattern id="grid3" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#5BC0EB" stroke-width="0.4" opacity="0.05"/>
    </pattern>
    <radialGradient id="bgRad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a3447" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0b0d"/>
    </radialGradient>
  </defs>

  <rect width="1190" height="842" fill="#0a0b0d"/>
  <rect width="1190" height="842" fill="url(#grid3)"/>
  <rect width="1190" height="842" fill="url(#bgRad)"/>

  <!-- Header -->
  <text x="80" y="60" font-size="11" fill="#5BC0EB" letter-spacing="3" font-weight="500">§03 · DEFENSE STACK</text>
  <text x="80" y="100" font-size="42" fill="#F2F4F7" font-weight="600" letter-spacing="-0.5">Пять слоёв защиты</text>
  <text x="80" y="135" font-size="14" fill="#8a93a6" max-width="800">Гибридная архитектура: барьерный ламинат, инертная среда, химический абсорбер, пассивный оптический контроль и самодиагностика. Без батарей. Без радио. Без обслуживания.</text>

  <line x1="80" y1="160" x2="1110" y2="160" stroke="#2A2F3A" stroke-width="1"/>

  <!-- ============== ВИЗУАЛИЗАЦИЯ ЛЕВАЯ ============== -->
  <!-- Большая концентрическая капсула в виде вложенных слоёв -->
  <g transform="translate(370, 480)">
    <!-- Layer 5 outer -->
    <ellipse cx="0" cy="0" rx="240" ry="180" fill="rgba(63,185,132,0.08)" stroke="#3FB984" stroke-width="0.8" stroke-dasharray="2,2"/>
    <text x="0" y="-200" font-size="9" font-family="JetBrains Mono" fill="#3FB984" letter-spacing="2" text-anchor="middle">LAYER 05 · DIAGNOSTICS</text>
    <!-- Layer 4 -->
    <ellipse cx="0" cy="0" rx="195" ry="140" fill="rgba(91,192,235,0.10)" stroke="#5BC0EB" stroke-width="1"/>
    <!-- Layer 3 -->
    <ellipse cx="0" cy="0" rx="155" ry="105" fill="rgba(232,163,61,0.10)" stroke="#E8A33D" stroke-width="0.8"/>
    <!-- Layer 2 inert atmosphere -->
    <ellipse cx="0" cy="0" rx="115" ry="75" fill="rgba(91,192,235,0.18)" stroke="#82d3f3" stroke-width="0.6"/>
    <!-- Layer 1 cargo -->
    <rect x="-70" y="-30" width="140" height="60" fill="#13151a" stroke="#5BC0EB" stroke-width="1" rx="4"/>
    <text x="0" y="5" fill="#F2F4F7" font-size="11" text-anchor="middle">CARGO</text>
    <text x="0" y="20" fill="#8a93a6" font-size="9" text-anchor="middle" font-family="JetBrains Mono">item to preserve</text>

    <!-- Газовые частицы -->
    <circle cx="-90" cy="-50" r="2" fill="#5BC0EB"/>
    <circle cx="80" cy="-40" r="2" fill="#5BC0EB"/>
    <circle cx="-50" cy="50" r="2" fill="#82d3f3"/>
    <circle cx="60" cy="55" r="1.8" fill="#82d3f3"/>
    <circle cx="0" cy="-60" r="2.2" fill="#5BC0EB"/>

    <!-- Patch sensor -->
    <circle cx="100" cy="-60" r="6" fill="#5BC0EB" stroke="#82d3f3" stroke-width="1.5"/>
    <circle cx="100" cy="-60" r="2" fill="#fff"/>

    <!-- Absorber sachets -->
    <rect x="-40" y="40" width="20" height="14" fill="#fff" stroke="#0a0b0d" stroke-width="0.5"/>
    <rect x="-15" y="40" width="20" height="14" fill="#fff" stroke="#0a0b0d" stroke-width="0.5"/>
    <rect x="10" y="40" width="20" height="14" fill="#fff" stroke="#0a0b0d" stroke-width="0.5"/>
  </g>

  <!-- ============== СПИСОК СЛОЁВ СПРАВА ============== -->

  <g font-family="Inter">
    <!-- Layer 01 -->
    <g transform="translate(680, 200)">
      <line x1="0" y1="-15" x2="0" y2="55" stroke="#5BC0EB" stroke-width="2"/>
      <text x="22" y="0" font-size="11" font-family="JetBrains Mono" fill="#5BC0EB" letter-spacing="2">LAYER 01 · BARRIER</text>
      <text x="22" y="32" font-size="22" fill="#F2F4F7" font-weight="600">Полимерно-фольговый ламинат</text>
      <text x="22" y="55" font-size="13" fill="#8a93a6" font-family="JetBrains Mono">PET/Al-foil/LLDPE 91 мкм · OTR ≤ 0.05 cm³/m²·day</text>
    </g>

    <!-- Layer 02 -->
    <g transform="translate(680, 290)">
      <line x1="0" y1="-15" x2="0" y2="55" stroke="#5BC0EB" stroke-width="2"/>
      <text x="22" y="0" font-size="11" font-family="JetBrains Mono" fill="#5BC0EB" letter-spacing="2">LAYER 02 · INERT ATMOSPHERE</text>
      <text x="22" y="32" font-size="22" fill="#F2F4F7" font-weight="600">Инертная среда N₂ или Ar</text>
      <text x="22" y="55" font-size="13" fill="#8a93a6" font-family="JetBrains Mono">O₂ ≤ 0.5% · точка росы ≤ −45 °C</text>
    </g>

    <!-- Layer 03 -->
    <g transform="translate(680, 380)">
      <line x1="0" y1="-15" x2="0" y2="55" stroke="#E8A33D" stroke-width="2"/>
      <text x="22" y="0" font-size="11" font-family="JetBrains Mono" fill="#E8A33D" letter-spacing="2">LAYER 03 · O₂ SCAVENGER</text>
      <text x="22" y="32" font-size="22" fill="#F2F4F7" font-weight="600">Химический кислород-абсорбер</text>
      <text x="22" y="55" font-size="13" fill="#8a93a6" font-family="JetBrains Mono">Mitsubishi Ageless Z / RP System / Pharmakeep</text>
    </g>

    <!-- Layer 04 -->
    <g transform="translate(680, 470)">
      <line x1="0" y1="-15" x2="0" y2="55" stroke="#5BC0EB" stroke-width="2"/>
      <text x="22" y="0" font-size="11" font-family="JetBrains Mono" fill="#5BC0EB" letter-spacing="2">LAYER 04 · PASSIVE SENSING</text>
      <text x="22" y="32" font-size="22" fill="#F2F4F7" font-weight="600">Пассивный оптический контроль</text>
      <text x="22" y="55" font-size="13" fill="#8a93a6" font-family="JetBrains Mono">Optical spot · 5–7 лет автономно · contactless readout</text>
    </g>

    <!-- Layer 05 -->
    <g transform="translate(680, 560)">
      <line x1="0" y1="-15" x2="0" y2="55" stroke="#3FB984" stroke-width="2"/>
      <text x="22" y="0" font-size="11" font-family="JetBrains Mono" fill="#3FB984" letter-spacing="2">LAYER 05 · SELF-DIAGNOSTICS</text>
      <text x="22" y="32" font-size="22" fill="#F2F4F7" font-weight="600">Алгоритм самодиагностики</text>
      <text x="22" y="55" font-size="13" fill="#8a93a6" font-family="JetBrains Mono">ΔP ↔ Δ[O₂] ↔ ΔT · auto-alert при утечке</text>
    </g>
  </g>

  <!-- Pull quote -->
  <g transform="translate(80, 720)">
    <text font-size="9" font-family="JetBrains Mono" fill="#5BC0EB" letter-spacing="3">— FROM PATENT v2.1, CLAIM 1</text>
    <text y="24" font-size="20" fill="#F2F4F7" font-weight="500" font-style="italic">«Гибридная архитектура из пяти независимых слоёв защиты, где отказ любого одного</text>
    <text y="50" font-size="20" fill="#F2F4F7" font-weight="500" font-style="italic">не приводит к деградации содержимого в течение 50 лет»</text>
  </g>

  <!-- Footer -->
  <text x="80" y="820" font-family="JetBrains Mono" font-size="9" fill="#8a93a6">КД-INERTUM v2-PREMIUM · ЛИСТ 03 · DEFENSE STACK</text>
  <text x="1110" y="820" font-family="JetBrains Mono" font-size="9" fill="#8a93a6" text-anchor="end">2026-05-09</text>
</svg>
