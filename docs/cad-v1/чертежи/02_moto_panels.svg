<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, Arial, sans-serif">
  <!-- Лист раскроя: 6 панелей мото-капсулы. Масштаб 1:30. Все размеры в мм. -->
  <defs>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#000"/>
    </marker>
  </defs>
  <style>
    .frame { fill: none; stroke: #000; stroke-width: 1.5; }
    .body { fill: #fafafa; stroke: #000; stroke-width: 1.4; }
    .seam { fill: none; stroke: #c00; stroke-width: 0.8; stroke-dasharray: 4,2; }
    .printable { fill: #f3e8ff; stroke: #6a1b9a; stroke-width: 0.6; }
    .marg { fill: #fff8e1; stroke: #b07000; stroke-width: 0.5; stroke-dasharray: 3,2; }
    .dim { fill: none; stroke: #000; stroke-width: 0.5; }
    .ext { fill: none; stroke: #000; stroke-width: 0.4; }
    .lbl { font-size: 11px; fill: #000; }
    .lblb { font-size: 12px; fill: #000; font-weight: 600; }
    .num { font-size: 10px; fill: #000; font-weight: 500; }
    .title { font-size: 16px; font-weight: 600; fill: #000; }
    .small { font-size: 9px; fill: #000; }
    .zipper { fill: none; stroke: #c00; stroke-width: 1.5; stroke-dasharray: 2,1; }
    .panel-num { font: 600 14px Inter; fill: #fff; }
    .pin { fill: #f44; stroke: #000; stroke-width: 0.5; }
    .glass { fill: #cfe; stroke: #08a; stroke-width: 0.6; }
  </style>

  <rect class="frame" x="20" y="20" width="1160" height="860"/>
  <rect class="frame" x="800" y="800" width="380" height="80"/>
  <line class="frame" x1="800" y1="820" x2="1180" y2="820"/>
  <line class="frame" x1="800" y1="850" x2="1180" y2="850"/>
  <line class="frame" x1="950" y1="800" x2="950" y2="880"/>
  <text class="lblb" x="810" y="813">Лист 02 · Мотокапсула — раскрой панелей</text>
  <text class="lbl" x="810" y="839">Чертёж: КД-INERTUM-MOTO-02 · v1.0</text>
  <text class="lbl" x="810" y="869">2026-05-09 · Аслан КАА · INERTUM</text>
  <text class="lbl" x="960" y="819">Масштаб 1:30</text>
  <text class="lbl" x="960" y="839">6 панелей · итого 14,02 м²</text>
  <text class="lbl" x="960" y="859">с припуском на сварку 30 мм</text>
  <text class="lbl" x="960" y="876">с припуском на молнию 50 мм</text>

  <text class="title" x="600" y="50" text-anchor="middle">Раскройная карта · 6 панелей</text>

  <!-- ПАНЕЛЬ 1 — ВЕРХНЯЯ -->
  <g transform="translate(80, 90)">
    <text class="lblb" x="0" y="-8">№1 · Верх (с проёмом под молнию)</text>
    <!-- Полная панель с припусками -->
    <rect class="marg" x="0" y="0" width="252" height="106"/>
    <!-- Чистовая зона -->
    <rect class="body" x="3" y="3" width="246" height="100"/>
    <!-- Зона печатной маркировки артикула -->
    <rect class="printable" x="3" y="3" width="246" height="14"/>
    <text class="small" x="125" y="12" text-anchor="middle">маркировка артикула: KD-MOTO-P1 · 2500×1000 · L=2500 W=1000 t=91μm</text>
    <!-- Молния по центральной длине -->
    <line class="zipper" x1="33" y1="35" x2="219" y2="35"/>
    <text class="small" x="125" y="32" text-anchor="middle" fill="#c00">проём под молнию L=3000 мм</text>
    <text class="small" x="125" y="56" text-anchor="middle">панель верх</text>

    <!-- Размеры -->
    <line class="dim" x1="3" y1="125" x2="249" y2="125" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="103" x2="3" y2="130"/>
    <line class="ext" x1="249" y1="103" x2="249" y2="130"/>
    <text class="num" x="125" y="120" text-anchor="middle">2500 (чист.) + 30+30 припуск</text>

    <line class="dim" x1="-25" y1="3" x2="-25" y2="103" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="3" x2="-30" y2="3"/>
    <line class="ext" x1="3" y1="103" x2="-30" y2="103"/>
    <text class="num" x="-30" y="56" text-anchor="end">1000</text>
  </g>

  <!-- ПАНЕЛЬ 2 — НИЖНЯЯ -->
  <g transform="translate(610, 90)">
    <text class="lblb" x="0" y="-8">№2 · Низ (дно)</text>
    <rect class="marg" x="0" y="0" width="252" height="106"/>
    <rect class="body" x="3" y="3" width="246" height="100"/>
    <rect class="printable" x="3" y="3" width="246" height="14"/>
    <text class="small" x="125" y="12" text-anchor="middle">маркировка: KD-MOTO-P2 · 2500×1000 · ДНО</text>
    <text class="small" x="125" y="56" text-anchor="middle">панель низ</text>
    <!-- Порт дозаправки в углу -->
    <circle cx="30" cy="80" r="4" class="pin"/>
    <text class="small" x="30" y="95" text-anchor="middle">порт</text>

    <line class="dim" x1="3" y1="125" x2="249" y2="125" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="103" x2="3" y2="130"/>
    <line class="ext" x1="249" y1="103" x2="249" y2="130"/>
    <text class="num" x="125" y="120" text-anchor="middle">2500 (чист.)</text>

    <line class="dim" x1="-25" y1="3" x2="-25" y2="103" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="3" x2="-30" y2="3"/>
    <line class="ext" x1="3" y1="103" x2="-30" y2="103"/>
    <text class="num" x="-30" y="56" text-anchor="end">1000</text>
  </g>

  <!-- ПАНЕЛЬ 3 — БОК ЛЕВЫЙ -->
  <g transform="translate(80, 270)">
    <text class="lblb" x="0" y="-8">№3 · Бок левый</text>
    <rect class="marg" x="0" y="0" width="252" height="156"/>
    <rect class="body" x="3" y="3" width="246" height="150"/>
    <rect class="printable" x="3" y="3" width="246" height="14"/>
    <text class="small" x="125" y="12" text-anchor="middle">маркировка: KD-MOTO-P3 · 2500×1500 · БОК L</text>
    <!-- Окно оптического считывания -->
    <rect class="glass" x="180" y="60" width="14" height="14"/>
    <text class="small" x="187" y="56" text-anchor="middle">окно ⌀30</text>
    <text class="small" x="125" y="100" text-anchor="middle">панель бок (видимая сторона)</text>

    <line class="dim" x1="3" y1="175" x2="249" y2="175" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="153" x2="3" y2="180"/>
    <line class="ext" x1="249" y1="153" x2="249" y2="180"/>
    <text class="num" x="125" y="170" text-anchor="middle">2500</text>

    <line class="dim" x1="-25" y1="3" x2="-25" y2="153" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="3" x2="-30" y2="3"/>
    <line class="ext" x1="3" y1="153" x2="-30" y2="153"/>
    <text class="num" x="-30" y="80" text-anchor="end">1500</text>
  </g>

  <!-- ПАНЕЛЬ 4 — БОК ПРАВЫЙ -->
  <g transform="translate(610, 270)">
    <text class="lblb" x="0" y="-8">№4 · Бок правый</text>
    <rect class="marg" x="0" y="0" width="252" height="156"/>
    <rect class="body" x="3" y="3" width="246" height="150"/>
    <rect class="printable" x="3" y="3" width="246" height="14"/>
    <text class="small" x="125" y="12" text-anchor="middle">маркировка: KD-MOTO-P4 · 2500×1500 · БОК R</text>
    <text class="small" x="125" y="100" text-anchor="middle">панель бок (зеркальная P3)</text>

    <line class="dim" x1="3" y1="175" x2="249" y2="175" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="153" x2="3" y2="180"/>
    <line class="ext" x1="249" y1="153" x2="249" y2="180"/>
    <text class="num" x="125" y="170" text-anchor="middle">2500</text>

    <line class="dim" x1="-25" y1="3" x2="-25" y2="153" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="3" x2="-30" y2="3"/>
    <line class="ext" x1="3" y1="153" x2="-30" y2="153"/>
    <text class="num" x="-30" y="80" text-anchor="end">1500</text>
  </g>

  <!-- ПАНЕЛЬ 5 — ТОРЕЦ ПЕРЕДНИЙ (с гермовводом) -->
  <g transform="translate(80, 480)">
    <text class="lblb" x="0" y="-8">№5 · Торец передний (с гермовводом)</text>
    <rect class="marg" x="0" y="0" width="106" height="156"/>
    <rect class="body" x="3" y="3" width="100" height="150"/>
    <rect class="printable" x="3" y="3" width="100" height="14"/>
    <text class="small" x="53" y="12" text-anchor="middle">KD-MOTO-P5 · 1000×1500</text>
    <!-- Гермоввод -->
    <circle cx="85" cy="30" r="4" fill="#000"/>
    <text class="small" x="85" y="22" text-anchor="middle">⌀M6 гермоввод</text>
    <text class="small" x="53" y="100" text-anchor="middle">торец передний</text>

    <line class="dim" x1="3" y1="175" x2="103" y2="175" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="153" x2="3" y2="180"/>
    <line class="ext" x1="103" y1="153" x2="103" y2="180"/>
    <text class="num" x="53" y="170" text-anchor="middle">1000</text>

    <line class="dim" x1="-25" y1="3" x2="-25" y2="153" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="3" x2="-30" y2="3"/>
    <line class="ext" x1="3" y1="153" x2="-30" y2="153"/>
    <text class="num" x="-30" y="80" text-anchor="end">1500</text>
  </g>

  <!-- ПАНЕЛЬ 6 — ТОРЕЦ ЗАДНИЙ -->
  <g transform="translate(280, 480)">
    <text class="lblb" x="0" y="-8">№6 · Торец задний (глухой)</text>
    <rect class="marg" x="0" y="0" width="106" height="156"/>
    <rect class="body" x="3" y="3" width="100" height="150"/>
    <rect class="printable" x="3" y="3" width="100" height="14"/>
    <text class="small" x="53" y="12" text-anchor="middle">KD-MOTO-P6 · 1000×1500</text>
    <text class="small" x="53" y="100" text-anchor="middle">торец задний</text>

    <line class="dim" x1="3" y1="175" x2="103" y2="175" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="153" x2="3" y2="180"/>
    <line class="ext" x1="103" y1="153" x2="103" y2="180"/>
    <text class="num" x="53" y="170" text-anchor="middle">1000</text>

    <line class="dim" x1="-25" y1="3" x2="-25" y2="153" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="3" y1="3" x2="-30" y2="3"/>
    <line class="ext" x1="3" y1="153" x2="-30" y2="153"/>
    <text class="num" x="-30" y="80" text-anchor="end">1500</text>
  </g>

  <!-- ВЕДОМОСТЬ ПАНЕЛЕЙ -->
  <g transform="translate(540, 480)">
    <text class="lblb" x="0" y="-8">Ведомость панелей</text>
    <rect x="0" y="0" width="540" height="180" fill="#fafafa" stroke="#000" stroke-width="0.6"/>
    <line stroke="#000" stroke-width="0.4" x1="0" y1="22" x2="540" y2="22"/>
    <line stroke="#000" stroke-width="0.4" x1="0" y1="44" x2="540" y2="44"/>
    <line stroke="#000" stroke-width="0.4" x1="0" y1="66" x2="540" y2="66"/>
    <line stroke="#000" stroke-width="0.4" x1="0" y1="88" x2="540" y2="88"/>
    <line stroke="#000" stroke-width="0.4" x1="0" y1="110" x2="540" y2="110"/>
    <line stroke="#000" stroke-width="0.4" x1="0" y1="132" x2="540" y2="132"/>
    <line stroke="#000" stroke-width="0.4" x1="0" y1="154" x2="540" y2="154"/>
    <line stroke="#000" stroke-width="0.4" x1="40" y1="0" x2="40" y2="180"/>
    <line stroke="#000" stroke-width="0.4" x1="160" y1="0" x2="160" y2="180"/>
    <line stroke="#000" stroke-width="0.4" x1="240" y1="0" x2="240" y2="180"/>
    <line stroke="#000" stroke-width="0.4" x1="320" y1="0" x2="320" y2="180"/>
    <line stroke="#000" stroke-width="0.4" x1="400" y1="0" x2="400" y2="180"/>

    <text class="num" x="20" y="15" text-anchor="middle">№</text>
    <text class="num" x="100" y="15" text-anchor="middle">Название</text>
    <text class="num" x="200" y="15" text-anchor="middle">L×W чист.</text>
    <text class="num" x="280" y="15" text-anchor="middle">L×W раскр.</text>
    <text class="num" x="360" y="15" text-anchor="middle">S, м²</text>
    <text class="num" x="470" y="15" text-anchor="middle">Особенности</text>

    <text class="num" x="20" y="37" text-anchor="middle">1</text>
    <text class="num" x="100" y="37" text-anchor="middle">Верх</text>
    <text class="num" x="200" y="37" text-anchor="middle">2500×1000</text>
    <text class="num" x="280" y="37" text-anchor="middle">2560×1060</text>
    <text class="num" x="360" y="37" text-anchor="middle">2,71</text>
    <text class="num" x="470" y="37" text-anchor="middle">проём под молнию</text>

    <text class="num" x="20" y="59" text-anchor="middle">2</text>
    <text class="num" x="100" y="59" text-anchor="middle">Низ</text>
    <text class="num" x="200" y="59" text-anchor="middle">2500×1000</text>
    <text class="num" x="280" y="59" text-anchor="middle">2560×1060</text>
    <text class="num" x="360" y="59" text-anchor="middle">2,71</text>
    <text class="num" x="470" y="59" text-anchor="middle">порт дозаправки</text>

    <text class="num" x="20" y="81" text-anchor="middle">3</text>
    <text class="num" x="100" y="81" text-anchor="middle">Бок L</text>
    <text class="num" x="200" y="81" text-anchor="middle">2500×1500</text>
    <text class="num" x="280" y="81" text-anchor="middle">2560×1560</text>
    <text class="num" x="360" y="81" text-anchor="middle">3,99</text>
    <text class="num" x="470" y="81" text-anchor="middle">оптическое окно</text>

    <text class="num" x="20" y="103" text-anchor="middle">4</text>
    <text class="num" x="100" y="103" text-anchor="middle">Бок R</text>
    <text class="num" x="200" y="103" text-anchor="middle">2500×1500</text>
    <text class="num" x="280" y="103" text-anchor="middle">2560×1560</text>
    <text class="num" x="360" y="103" text-anchor="middle">3,99</text>
    <text class="num" x="470" y="103" text-anchor="middle">зеркальная P3</text>

    <text class="num" x="20" y="125" text-anchor="middle">5</text>
    <text class="num" x="100" y="125" text-anchor="middle">Торец F</text>
    <text class="num" x="200" y="125" text-anchor="middle">1000×1500</text>
    <text class="num" x="280" y="125" text-anchor="middle">1060×1560</text>
    <text class="num" x="360" y="125" text-anchor="middle">1,65</text>
    <text class="num" x="470" y="125" text-anchor="middle">гермоввод M6</text>

    <text class="num" x="20" y="147" text-anchor="middle">6</text>
    <text class="num" x="100" y="147" text-anchor="middle">Торец R</text>
    <text class="num" x="200" y="147" text-anchor="middle">1000×1500</text>
    <text class="num" x="280" y="147" text-anchor="middle">1060×1560</text>
    <text class="num" x="360" y="147" text-anchor="middle">1,65</text>
    <text class="num" x="470" y="147" text-anchor="middle">глухой</text>

    <text class="lblb" x="20" y="170">Σ</text>
    <text class="num" x="100" y="170" text-anchor="middle">Итого</text>
    <text class="num" x="280" y="170" text-anchor="middle">—</text>
    <text class="num" x="360" y="170" text-anchor="middle">16,71</text>
    <text class="num" x="470" y="170" text-anchor="middle">с припусками 30 мм</text>
  </g>

  <!-- СХЕМА УКЛАДКИ НА РУЛОН -->
  <g transform="translate(80, 690)">
    <text class="lblb" x="0" y="-8">Раскладка на рулон шириной 2000 мм (L полн = ≈ 9,2 м)</text>
    <!-- Рулон 2000×9200 → масштаб 1:30 → 67×307 px -->
    <rect class="marg" x="0" y="0" width="900" height="67"/>
    <line class="dim" x1="0" y1="-15" x2="900" y2="-15" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <text class="num" x="450" y="-20" text-anchor="middle">≈ 9 200 мм длина рулона на 1 капсулу</text>

    <!-- P1 верх 2560×1060 → 85×35 -->
    <rect x="6" y="3" width="85" height="35" fill="#bbdefb" stroke="#000" stroke-width="0.5"/>
    <text class="panel-num" x="48" y="25" fill="#000" text-anchor="middle">P1</text>
    <!-- P2 низ под P1 -->
    <rect x="6" y="40" width="85" height="35" fill="#bbdefb" stroke="#000" stroke-width="0.5"/>
    <text class="panel-num" x="48" y="62" fill="#000" text-anchor="middle">P2</text>

    <!-- P3 бок 2560×1560 → 85×52 -->
    <rect x="100" y="3" width="85" height="52" fill="#c8e6c9" stroke="#000" stroke-width="0.5"/>
    <text class="panel-num" x="142" y="32" fill="#000" text-anchor="middle">P3</text>

    <!-- P4 бок -->
    <rect x="195" y="3" width="85" height="52" fill="#c8e6c9" stroke="#000" stroke-width="0.5"/>
    <text class="panel-num" x="237" y="32" fill="#000" text-anchor="middle">P4</text>

    <!-- P5 торец 1060×1560 → 35×52 -->
    <rect x="290" y="3" width="35" height="52" fill="#fff3e0" stroke="#000" stroke-width="0.5"/>
    <text class="panel-num" x="307" y="32" fill="#000" text-anchor="middle">P5</text>

    <!-- P6 торец -->
    <rect x="330" y="3" width="35" height="52" fill="#fff3e0" stroke="#000" stroke-width="0.5"/>
    <text class="panel-num" x="347" y="32" fill="#000" text-anchor="middle">P6</text>

    <!-- Резервная зона + остаток -->
    <text class="small" x="500" y="33">Резерв на брак: ≈ 4 м² → перекладка узлов и обрезков</text>
    <text class="small" x="500" y="48">Расход ламината с учётом 15 % отходов: ≈ 19,2 м²</text>

    <!-- Размер ширины рулона -->
    <line class="dim" x1="-30" y1="0" x2="-30" y2="67" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="0" y1="0" x2="-35" y2="0"/>
    <line class="ext" x1="0" y1="67" x2="-35" y2="67"/>
    <text class="num" x="-37" y="38" text-anchor="end">2000</text>
  </g>
</svg>
