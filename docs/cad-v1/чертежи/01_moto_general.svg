<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, Arial, sans-serif">
  <!-- Лист общего вида мото-капсулы. ЕСКД-подобное оформление, 3 проекции + изометрия -->
  <defs>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#000"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#888" stroke-width="0.6"/>
    </pattern>
  </defs>
  <style>
    .frame { fill: none; stroke: #000; stroke-width: 1.5; }
    .body { fill: none; stroke: #000; stroke-width: 1.4; }
    .hidden { fill: none; stroke: #000; stroke-width: 0.8; stroke-dasharray: 5,3; }
    .axis { fill: none; stroke: #000; stroke-width: 0.5; stroke-dasharray: 8,2,1.5,2; }
    .dim { fill: none; stroke: #000; stroke-width: 0.5; }
    .ext { fill: none; stroke: #000; stroke-width: 0.4; }
    .lbl { font-size: 11px; fill: #000; }
    .lblb { font-size: 12px; fill: #000; font-weight: 600; }
    .num { font-size: 11px; fill: #000; font-weight: 500; }
    .title { font-size: 16px; font-weight: 600; fill: #000; }
    .small { font-size: 9px; fill: #000; }
    .gas { fill: #d8eeff; opacity: 0.6; }
    .moto { fill: none; stroke: #444; stroke-width: 1; }
    .pin { fill: #f44; stroke: #000; stroke-width: 0.5; }
    .glass { fill: #cfe; stroke: #08a; stroke-width: 0.6; opacity: 0.8; }
    .zipper { fill: none; stroke: #000; stroke-width: 0.8; stroke-dasharray: 1,1; }
  </style>

  <!-- РАМКА И ОСНОВНАЯ НАДПИСЬ (упрощённая ЕСКД) -->
  <rect class="frame" x="20" y="20" width="1160" height="860"/>
  <rect class="frame" x="800" y="800" width="380" height="80"/>
  <line class="frame" x1="800" y1="820" x2="1180" y2="820"/>
  <line class="frame" x1="800" y1="850" x2="1180" y2="850"/>
  <line class="frame" x1="950" y1="800" x2="950" y2="880"/>
  <text class="lblb" x="810" y="813">Лист 01 · Мотоциклетная капсула — общий вид</text>
  <text class="lbl" x="810" y="839">Чертёж: КД-INERTUM-MOTO-01 · v1.0</text>
  <text class="lbl" x="810" y="869">2026-05-09 · Аслан КАА · INERTUM</text>
  <text class="lbl" x="960" y="819">Масштаб 1:25</text>
  <text class="lbl" x="960" y="839">Материал: PET/Al/LLDPE 91 мкм</text>
  <text class="lbl" x="960" y="859">Объём: V<tspan baseline-shift="sub" font-size="9">внутр</tspan> = 3,75 м³</text>
  <text class="lbl" x="960" y="876">Площадь: S = 14,0 м² с припусками</text>

  <text class="title" x="600" y="50" text-anchor="middle">INERTUM-MOTO · Прототип №1 · Общий вид</text>

  <!-- ВИД СБОКУ (главный) -->
  <text class="lblb" x="180" y="100" text-anchor="middle">Вид сбоку (главный)</text>
  <!-- Контур капсулы 250×150 мм на чертеже = 2500×1500 мм real -->
  <g transform="translate(60, 130)">
    <rect class="body" x="0" y="0" width="280" height="170" rx="6" ry="6"/>
    <rect class="gas" x="2" y="2" width="276" height="166" rx="5" ry="5"/>
    <!-- Молния по верху -->
    <line class="zipper" x1="10" y1="0" x2="270" y2="0" stroke="#c00" stroke-width="1.4"/>
    <text class="small" x="140" y="-6" text-anchor="middle" fill="#c00">Молния YKK Aquaseal #8 · L=3000 мм</text>
    <!-- Порт дозаправки -->
    <circle cx="40" cy="160" r="5" class="pin"/>
    <text class="small" x="40" y="178" text-anchor="middle">Порт</text>
    <!-- Оптическое окно -->
    <rect class="glass" x="200" y="60" width="14" height="14"/>
    <text class="small" x="207" y="56" text-anchor="middle">Окно ⌀30</text>
    <!-- Гермоввод -->
    <circle cx="265" cy="20" r="3" fill="#000"/>
    <text class="small" x="265" y="14" text-anchor="middle">Гермоввод</text>
    <!-- Мотоцикл внутри (силуэт) -->
    <g class="moto" transform="translate(40, 80)">
      <circle cx="35" cy="50" r="22"/>
      <circle cx="160" cy="50" r="22"/>
      <path d="M35,50 L70,20 L130,20 L160,50 M70,20 L70,5 M130,20 L130,5 M85,15 L120,15"/>
      <path d="M55,50 L100,30 L130,50"/>
    </g>
    <text class="small" x="140" y="170" text-anchor="middle" fill="#444">мотоцикл (силуэт)</text>

    <!-- Размеры сбоку -->
    <line class="dim" x1="0" y1="200" x2="280" y2="200" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="0" y1="170" x2="0" y2="205"/>
    <line class="ext" x1="280" y1="170" x2="280" y2="205"/>
    <text class="num" x="140" y="195" text-anchor="middle">2500</text>

    <line class="dim" x1="-30" y1="0" x2="-30" y2="170" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="0" y1="0" x2="-35" y2="0"/>
    <line class="ext" x1="0" y1="170" x2="-35" y2="170"/>
    <text class="num" x="-37" y="88" text-anchor="end">1500</text>
  </g>

  <!-- ВИД СВЕРХУ -->
  <text class="lblb" x="500" y="100" text-anchor="middle">Вид сверху</text>
  <g transform="translate(380, 130)">
    <rect class="body" x="0" y="0" width="280" height="113" rx="5" ry="5"/>
    <rect class="gas" x="2" y="2" width="276" height="109" rx="4" ry="4"/>
    <!-- Молния по верху -->
    <line class="zipper" x1="10" y1="0" x2="270" y2="0" stroke="#c00" stroke-width="1.4"/>
    <line class="hidden" x1="10" y1="56" x2="270" y2="56"/>
    <text class="small" x="140" y="62" text-anchor="middle" fill="#888">центральная ось мотоцикла</text>

    <!-- Порт + окно сверху -->
    <circle cx="40" cy="100" r="4" class="pin"/>
    <rect class="glass" x="200" y="20" width="14" height="14"/>
    <circle cx="265" cy="10" r="3" fill="#000"/>

    <!-- Размеры -->
    <line class="dim" x1="0" y1="143" x2="280" y2="143" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="0" y1="113" x2="0" y2="148"/>
    <line class="ext" x1="280" y1="113" x2="280" y2="148"/>
    <text class="num" x="140" y="138" text-anchor="middle">2500</text>

    <line class="dim" x1="-30" y1="0" x2="-30" y2="113" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="0" y1="0" x2="-35" y2="0"/>
    <line class="ext" x1="0" y1="113" x2="-35" y2="113"/>
    <text class="num" x="-37" y="60" text-anchor="end">1000</text>
  </g>

  <!-- ВИД СПЕРЕДИ (торец) -->
  <text class="lblb" x="850" y="100" text-anchor="middle">Вид спереди (торец)</text>
  <g transform="translate(770, 130)">
    <rect class="body" x="0" y="0" width="160" height="170" rx="5" ry="5"/>
    <rect class="gas" x="2" y="2" width="156" height="166" rx="4" ry="4"/>
    <!-- Молния -->
    <line class="zipper" x1="0" y1="0" x2="160" y2="0" stroke="#c00" stroke-width="1.4"/>
    <!-- Мотоцикл (вид спереди) -->
    <g class="moto" transform="translate(60,55)">
      <circle cx="20" cy="70" r="22"/>
      <path d="M0,70 L40,70 M20,70 L20,20 M5,20 L35,20 M10,20 L10,5 M30,20 L30,5"/>
    </g>

    <!-- Размеры -->
    <line class="dim" x1="0" y1="200" x2="160" y2="200" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="0" y1="170" x2="0" y2="205"/>
    <line class="ext" x1="160" y1="170" x2="160" y2="205"/>
    <text class="num" x="80" y="195" text-anchor="middle">1000</text>

    <line class="dim" x1="-30" y1="0" x2="-30" y2="170" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="0" y1="0" x2="-35" y2="0"/>
    <line class="ext" x1="0" y1="170" x2="-35" y2="170"/>
    <text class="num" x="-37" y="88" text-anchor="end">1500</text>
  </g>

  <!-- ИЗОМЕТРИЯ -->
  <text class="lblb" x="280" y="430" text-anchor="middle">Изометрия</text>
  <g transform="translate(80, 460) scale(0.85)">
    <!-- Изометрический параллелепипед с углами 30° -->
    <!-- Передняя грань -->
    <polygon class="body" points="0,150 200,150 200,0 0,0" fill="#e8f4fb"/>
    <!-- Верхняя грань -->
    <polygon class="body" points="0,0 200,0 280,-60 80,-60" fill="#d8eeff"/>
    <!-- Боковая грань -->
    <polygon class="body" points="200,0 280,-60 280,90 200,150" fill="#c8e6f9"/>
    <!-- Молния по верху -->
    <line stroke="#c00" stroke-width="2" stroke-dasharray="2,1.5" x1="80" y1="-60" x2="280" y2="-60"/>
    <!-- Порт -->
    <circle cx="20" cy="135" r="6" class="pin"/>
    <!-- Окно -->
    <rect class="glass" x="160" y="50" width="22" height="22"/>
    <!-- Гермоввод -->
    <circle cx="265" cy="-50" r="4" fill="#000"/>
    <!-- Подписи -->
    <text class="small" x="20" y="150" text-anchor="middle">Порт</text>
    <text class="small" x="180" y="46" text-anchor="middle">Опт. окно</text>
    <text class="small" x="280" y="-65" text-anchor="end">Гермоввод</text>
    <text class="small" x="180" y="-72" text-anchor="middle" fill="#c00">Молния L=3000</text>
  </g>

  <!-- РАЗРЕЗ A-A (перпендикулярно длинной оси) -->
  <text class="lblb" x="850" y="430" text-anchor="middle">Разрез A-A · слой ламината</text>
  <g transform="translate(700, 470)">
    <rect class="body" x="0" y="0" width="280" height="60" fill="#fff"/>
    <!-- 3 слоя -->
    <rect x="0" y="0" width="280" height="14" fill="#e8f4fb"/>
    <rect x="0" y="14" width="280" height="11" fill="#cfd8dc"/>
    <rect x="0" y="25" width="280" height="35" fill="#fff3e0"/>
    <line class="body" x1="0" y1="0" x2="280" y2="0"/>
    <line class="body" x1="0" y1="14" x2="280" y2="14"/>
    <line class="body" x1="0" y1="25" x2="280" y2="25"/>
    <line class="body" x1="0" y1="60" x2="280" y2="60"/>

    <text class="num" x="140" y="10" text-anchor="middle">PET 12 мкм · ½ внешний слой</text>
    <text class="num" x="140" y="22" text-anchor="middle">Al-foil 9 мкм · барьер</text>
    <text class="num" x="140" y="46" text-anchor="middle">LLDPE 70 мкм · сварной слой</text>

    <!-- Размер общей толщины -->
    <line class="dim" x1="-30" y1="0" x2="-30" y2="60" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
    <line class="ext" x1="0" y1="0" x2="-35" y2="0"/>
    <line class="ext" x1="0" y1="60" x2="-35" y2="60"/>
    <text class="num" x="-37" y="33" text-anchor="end">91 мкм</text>

    <!-- Внешняя сторона -->
    <text class="small" x="290" y="5">наружу ↑</text>
    <text class="small" x="290" y="63">внутрь ↓</text>
  </g>

  <!-- ТЕХ. ТРЕБОВАНИЯ -->
  <g transform="translate(60, 590)">
    <text class="lblb" x="0" y="0">Технические требования</text>
    <text class="lbl" x="0" y="22">1. Все размеры — внутренние, в миллиметрах. Допуск на габариты ± 30 мм.</text>
    <text class="lbl" x="0" y="40">2. Ламинат — PET 12 мкм / Al-foil 9 мкм / LLDPE 70 мкм. OTR ≤ 0,05 см³/(м²·сут·атм). MIL-PRF-131K или ГОСТ 9.014 ВУ-5.</text>
    <text class="lbl" x="0" y="58">3. Швы — термосварка LLDPE при T = 130–150 °C. Ширина шва не менее 10 мм. Двойной шов на длинных гранях.</text>
    <text class="lbl" x="0" y="76">4. Молния YKK Aquaseal № 8, L = 3000 мм, по верхней грани одной длинной стороны. Дублировать клейкой лентой 3M VHB после закрытия.</text>
    <text class="lbl" x="0" y="94">5. Порт дозаправки — Schrader-клапан с обратным ходом, расположен в углу нижнего торца, высота 100 мм от дна.</text>
    <text class="lbl" x="0" y="112">6. Оптическое окно ⌀30 мм — локальная зона без Al-foil слоя, заклеена прозрачной PET 50 мкм. Расположение — в видимой зоне.</text>
    <text class="lbl" x="0" y="130">7. Гермоввод М6 — для опционального проводного датчика T/RH (DS18B20, шлейф 1-Wire). Расположен в углу под молнией.</text>
    <text class="lbl" x="0" y="148">8. Опрессовка после сборки: воздух +5 кПа, выдержка 30 мин, утечка не более 0,3 кПа за 30 мин.</text>
    <text class="lbl" x="0" y="166">9. Внутренний объём после установки изделия: V ≥ 2,5 м³ (учёт вытесненного объёма мотоцикла ≈ 1 м³).</text>
    <text class="lbl" x="0" y="184">10. Заполнение: азот N₂ чистоты ≥ 99,99 % по ГОСТ 9293-74. Кратность продува ≥ 3V<tspan baseline-shift="sub" font-size="9">внутр</tspan> = 12 м³.</text>
  </g>

  <!-- ЛЕГЕНДА -->
  <g transform="translate(720, 590)">
    <text class="lblb" x="0" y="0">Условные обозначения</text>
    <line class="zipper" x1="0" y1="20" x2="40" y2="20" stroke="#c00" stroke-width="1.5"/>
    <text class="lbl" x="50" y="24">молния YKK Aquaseal</text>
    <circle cx="20" cy="40" r="5" class="pin"/>
    <text class="lbl" x="50" y="44">порт дозаправки (Schrader)</text>
    <rect class="glass" x="10" y="55" width="20" height="14"/>
    <text class="lbl" x="50" y="66">оптическое окно (без фольги)</text>
    <circle cx="20" cy="84" r="3" fill="#000"/>
    <text class="lbl" x="50" y="88">гермоввод (опционально)</text>
    <line class="hidden" x1="0" y1="105" x2="40" y2="105"/>
    <text class="lbl" x="50" y="109">скрытый контур</text>
    <line class="axis" x1="0" y1="125" x2="40" y2="125"/>
    <text class="lbl" x="50" y="129">осевая линия</text>
  </g>
</svg>
