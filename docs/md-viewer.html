<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INERTUM · MD Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="../assets/topbar.js" defer></script>
<style>
  :root {
    --bg-base: #0A0B0D; --bg-elev: #13151A; --bg-elev-2: #1C1F26;
    --ink: #F2F4F7; --ink-muted: #8A93A6; --ink-secondary: #C7CCD6;
    --argon: #5BC0EB; --argon-bright: #82d3f3;
    --warn: #E8A33D; --success: #3FB984; --danger: #E5685A;
    --stroke: #2A2F3A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-base); color: var(--ink);
    font: 16px/1.7 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(91,192,235,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,192,235,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 80%);
  }
  .shell { max-width: 1000px; margin: 0 auto; padding: 32px 32px 96px; position: relative; z-index: 1; }
  header.bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; margin-bottom: 32px;
    background: var(--bg-elev); border: 1px solid var(--stroke); border-radius: 8px;
    flex-wrap: wrap; gap: 12px;
  }
  .bar a { color: var(--argon); text-decoration: none; font: 500 13px 'JetBrains Mono'; }
  .bar a:hover { color: var(--argon-bright); }
  .bar .filename { font: 500 12px 'JetBrains Mono'; color: var(--ink-muted); letter-spacing: 0.06em; }
  .bar .left, .bar .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .bar button, .bar a.btn {
    background: transparent; border: 1px solid var(--stroke); color: var(--ink-muted);
    padding: 6px 12px; border-radius: 4px; font: 500 11px 'JetBrains Mono';
    cursor: pointer; text-decoration: none; transition: all .15s; letter-spacing: 0.05em;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .bar button:hover, .bar a.btn:hover { border-color: var(--argon); color: var(--argon); }
  .bar .nav-icons { display: flex; gap: 4px; padding-right: 8px; border-right: 1px solid var(--stroke); margin-right: 4px; }
  .bar .icon-btn {
    background: transparent; border: 1px solid var(--stroke); color: var(--ink-muted);
    width: 32px; height: 32px; padding: 0; border-radius: 4px;
    cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; justify-content: center;
  }
  .bar .icon-btn:hover { border-color: var(--argon); color: var(--argon); }
  .bar .icon-btn svg { width: 14px; height: 14px; }

  .md-body { color: var(--ink-secondary); font-size: 16px; line-height: 1.7; }
  .md-body h1, .md-body h2, .md-body h3, .md-body h4 { color: var(--ink); letter-spacing: -0.01em; }
  .md-body h1 { font-size: 36px; line-height: 1.15; margin: 0 0 24px; }
  .md-body h2 { font-size: 26px; margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--stroke); }
  .md-body h3 { font-size: 20px; margin: 32px 0 12px; }
  .md-body h4 { font-size: 17px; margin: 24px 0 8px; }
  .md-body p { margin: 0 0 16px; }
  .md-body strong { color: var(--ink); font-weight: 600; }
  .md-body em { color: var(--ink); }
  .md-body a { color: var(--argon); text-decoration: none; border-bottom: 1px solid rgba(91,192,235,0.3); }
  .md-body a:hover { border-bottom-color: var(--argon); }
  .md-body ul, .md-body ol { padding-left: 24px; margin: 0 0 16px; }
  .md-body li { margin-bottom: 6px; }
  .md-body code {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    background: var(--bg-elev-2); border: 1px solid var(--stroke);
    border-radius: 3px; padding: 2px 6px; color: var(--argon);
  }
  .md-body pre {
    background: var(--bg-elev); border: 1px solid var(--stroke);
    border-radius: 6px; padding: 16px; overflow-x: auto; margin: 16px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .md-body pre code { border: 0; background: transparent; padding: 0; color: var(--ink); }
  .md-body blockquote {
    border-left: 3px solid var(--argon);
    padding: 0 0 0 20px; margin: 16px 0;
    color: var(--ink); font-style: italic;
  }
  .md-body table {
    width: 100%; border-collapse: collapse; font-size: 14px; margin: 16px 0;
    background: var(--bg-elev); border-radius: 8px; overflow: hidden;
  }
  .md-body table th, .md-body table td {
    padding: 10px 14px; text-align: left;
    border-bottom: 1px solid var(--stroke); vertical-align: top;
  }
  .md-body table th {
    font: 500 11px 'JetBrains Mono'; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-muted);
    background: var(--bg-elev-2);
  }
  .md-body table td { color: var(--ink-secondary); }
  .md-body hr { border: 0; border-top: 1px solid var(--stroke); margin: 32px 0; }

  .raw-fallback {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.7;
    white-space: pre-wrap; word-wrap: break-word;
    background: var(--bg-elev); border: 1px solid var(--stroke);
    border-radius: 6px; padding: 24px; color: var(--ink-secondary);
  }

  .loading, .err {
    padding: 64px 24px; text-align: center;
    color: var(--ink-muted); font-family: 'JetBrains Mono'; font-size: 13px;
  }
  .err { color: var(--warn); }
  .err pre {
    background: var(--bg-elev-2); padding: 12px; border-radius: 4px;
    text-align: left; font-size: 11px; color: var(--ink-secondary);
    max-width: 800px; margin: 16px auto; overflow-x: auto;
  }

  .toc {
    background: var(--bg-elev); border: 1px solid var(--stroke); border-radius: 8px;
    padding: 16px 20px; margin-bottom: 24px;
    max-height: 300px; overflow-y: auto;
  }
  .toc h5 {
    font: 500 11px 'JetBrains Mono'; color: var(--ink-muted);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
  }
  .toc a {
    display: block; padding: 4px 0;
    color: var(--ink-secondary); font-size: 13px; line-height: 1.5;
    text-decoration: none; border-bottom: 0;
  }
  .toc a:hover { color: var(--argon); }
  .toc a.h3 { padding-left: 16px; font-size: 12px; color: var(--ink-muted); }
  .toc a.h4 { padding-left: 32px; font-size: 11px; color: var(--ink-muted); }
</style>
</head>
<body>

<div class="shell">
  <header class="bar">
    <div class="left">
      <div class="nav-icons">
        <a class="icon-btn" href="../hub.html" title="Hub"><svg><use href="../assets/icons.svg#home"/></svg></a>
        <button class="icon-btn" onclick="history.back()" title="Назад"><svg><use href="../assets/icons.svg#arrow-left"/></svg></button>
        <button class="icon-btn" onclick="history.forward()" title="Вперёд"><svg><use href="../assets/icons.svg#arrow-right"/></svg></button>
        <button class="icon-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="В начало"><svg><use href="../assets/icons.svg#top"/></svg></button>
      </div>
      <span class="filename" id="fileLabel"></span>
    </div>
    <div class="actions">
      <a class="btn" id="dlBtn" download>↓ Скачать MD</a>
      <button onclick="window.print()">⎙ Печать</button>
      <button onclick="toggleRaw()" id="rawBtn">⇄ Plain text</button>
    </div>
  </header>

  <div class="toc" id="toc" style="display:none;"></div>

  <article class="md-body" id="body">
    <div class="loading">Загрузка документа…</div>
  </article>
</div>

<!-- marked.js · multiple CDN fallback strategy -->
<script>
  // Глобальное состояние
  window.MDViewerState = {
    fileText: null,
    rendered: false,
    showingRaw: false,
  };

  function showError(title, detail) {
    const body = document.getElementById('body');
    body.innerHTML = '<div class="err"><strong>' + title + '</strong>' +
      (detail ? '<pre>' + detail + '</pre>' : '') + '</div>';
  }

  function loadMarked(callback, attempt) {
    attempt = attempt || 0;
    const cdns = [
      'https://cdn.jsdelivr.net/npm/marked@13.0.0/marked.min.js',
      'https://unpkg.com/marked@13.0.0/marked.min.js',
      'https://cdn.jsdelivr.net/npm/marked@9.0.0/marked.min.js',
    ];
    if (attempt >= cdns.length) {
      callback(new Error('Все CDN marked.js недоступны. Проверьте интернет-соединение.'));
      return;
    }
    const s = document.createElement('script');
    s.src = cdns[attempt];
    s.onload = () => callback(null);
    s.onerror = () => loadMarked(callback, attempt + 1);
    document.head.appendChild(s);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderRaw() {
    document.getElementById('body').innerHTML =
      '<div class="raw-fallback">' + escapeHtml(window.MDViewerState.fileText || '') + '</div>';
    document.getElementById('toc').style.display = 'none';
  }

  function renderMarkdown() {
    if (typeof marked === 'undefined') {
      showError('marked.js не загрузился', 'Показываем как plain text.');
      setTimeout(renderRaw, 50);
      return;
    }
    try {
      marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });
      const html = marked.parse(window.MDViewerState.fileText);
      document.getElementById('body').innerHTML = html;

      const headings = document.querySelectorAll('#body h1, #body h2, #body h3, #body h4');
      const toc = document.getElementById('toc');
      let tocHtml = '<h5>Содержание</h5>';
      let hasToc = false;
      headings.forEach((h, i) => {
        const id = 's-' + i + '-' + h.textContent.toLowerCase().replace(/[^\w\sа-яё-]/giu, '').trim().replace(/\s+/g, '-').slice(0, 60);
        h.id = id;
        if (h.tagName === 'H2' || h.tagName === 'H3') {
          tocHtml += '<a href="#' + id + '" class="' + h.tagName.toLowerCase() + '">' + escapeHtml(h.textContent) + '</a>';
          hasToc = true;
        }
      });
      if (hasToc) {
        toc.innerHTML = tocHtml;
        toc.style.display = 'block';
      }
      window.MDViewerState.rendered = true;
    } catch (e) {
      console.error('marked.parse failed:', e);
      showError('Ошибка рендеринга markdown', e.message + '\n\n' + (e.stack || ''));
      setTimeout(renderRaw, 1000);
    }
  }

  function toggleRaw() {
    if (!window.MDViewerState.fileText) return;
    window.MDViewerState.showingRaw = !window.MDViewerState.showingRaw;
    if (window.MDViewerState.showingRaw) {
      renderRaw();
      document.getElementById('rawBtn').textContent = '⇄ Markdown';
    } else {
      renderMarkdown();
      document.getElementById('rawBtn').textContent = '⇄ Plain text';
    }
  }

  // === MAIN ===
  (function init() {
    const params = new URLSearchParams(location.search);
    const file = params.get('file');
    if (!file) {
      showError('Не указан файл', 'Используйте параметр ?file=имя.md в URL.');
      return;
    }
    if (!/^[\w\-./]+\.md$/.test(file)) {
      showError('Некорректное имя файла', 'Допустимы только латинские буквы/цифры/подчёркивание/дефис, расширение .md');
      return;
    }

    document.getElementById('fileLabel').textContent = file;
    document.getElementById('dlBtn').href = file;
    document.getElementById('dlBtn').download = file;
    document.title = 'INERTUM · ' + file;

    fetch(file, { cache: 'no-store' })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
        return r.text();
      })
      .then(text => {
        if (!text || text.length === 0) {
          showError('Пустой файл', file);
          return;
        }
        window.MDViewerState.fileText = text;
        document.getElementById('body').innerHTML = '<div class="loading">Подгружаем парсер…</div>';
        loadMarked(err => {
          if (err) {
            console.warn('marked.js fallback to raw:', err);
            renderRaw();
          } else {
            renderMarkdown();
          }
        });
      })
      .catch(e => {
        console.error('fetch failed:', e);
        showError('Не удалось загрузить ' + file, e.message);
      });
  })();
</script>
</body>
</html>
